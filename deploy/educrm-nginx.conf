server {
    listen 80;
    server_name YOUR_DUCKDNS_DOMAIN.duckdns.org;

    client_max_body_size 20m;

    types {
        application/manifest+json webmanifest;
    }

    location /static/ {
        alias /srv/educrm/staticfiles/;
        access_log off;
        expires 7d;
    }

    location = /manifest.webmanifest {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    location = /sw.js {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /app-icon.svg {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location = /apple-touch-icon.svg {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location = /app-icon.jpeg {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        root /srv/educrm/frontend-dist;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:10234;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:10234;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location / {
        root /srv/educrm/frontend-dist;
        try_files $uri $uri/ /index.html;
    }
}
